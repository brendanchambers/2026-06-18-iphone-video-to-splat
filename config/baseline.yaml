# Main configuration file for the 3D Gaussian Splat Pipeline

# Project structure
project:
  dir: "/Users/bc/brendanchambers/2026-06-18-iphone-video-to-splat"
  video_path: "./data/incoming/movies/gardenbed_2026-06-17.mov"
  experiment_name: "current_scene"
  experiment_group: "baseline"

# Input/output paths
paths:
  colmap_sfm_camera_model: "${project.dir}/data/intermediates/${project.experiment_name}/colmap_sfm_camera_model"
  colmap_sfm_linearized: "${project.dir}/data/intermediates/${project.experiment_name}/colmap_sfm_linearized"
  images_dir: "${paths.colmap_sfm_camera_model}/images"
  sparse_dir: "${paths.colmap_sfm_camera_model}/sparse"
  database_path: "${paths.colmap_sfm_camera_model}/database.db"
  log_dir: "${project.dir}/logs"
  opensplat_bin: "${project.dir}/opensplat/build/opensplat"
  opensplat_output_dir: "${paths.colmap_sfm_linearized}/splats"

# Frame extraction parameters
frame_extraction:
  fps: 2                              # Constant framerate in frames per second
  quality: 5                          # JPEG quality (1-5)

# COLMAP Feature Extraction parameters
colmap:
  feature_extraction:
    camera_model: "RADIAL"
    single_camera: 1
    default_focal_length_factor: 1.2
    type: "SIFT"
    use_gpu: 1
    gpu_index: -1
    sift_max_num_features: 4096
    sift_first_octave: -1
    sift_num_octaves: 4
    sift_octave_resolution: 3
    sift_peak_threshold: 0.00667
    sift_edge_threshold: 10
    sift_estimate_affine_shape: 0
    sift_max_num_orientations: 2
    sift_upright: 0

  feature_matching:
    type: "SIFT_BRUTEFORCE"
    use_gpu: 1
    gpu_index: -1
    guided_matching: 0
    skip_geometric_verification: 0
    max_num_matches: 32768
    sift_max_ratio: 0.8
    sift_max_distance: 0.7
    sift_cross_check: 1
    cpu_brute_force_matcher: 0
    two_view_min_num_inliers: 15
    two_view_max_error: 4
    two_view_confidence: 0.999
    two_view_max_num_trials: 10000
    two_view_min_inlier_ratio: 0.25
    sequential_overlap: 20

  mapper:
    multiple_models: 1
    max_num_models: 50
    min_model_size: 10
    init_num_trials: 200
    extract_colors: 1
    num_threads: -1
    min_focal_length_ratio: 0.1
    max_focal_length_ratio: 10
    ba_refine_focal_length: 1
    ba_refine_principal_point: 0
    ba_refine_extra_params: 1
    ba_local_max_num_iterations: 25
    ba_global_max_num_iterations: 50
    ba_global_frames_freq: 500
    ba_global_points_freq: 250000
    filter_max_reproj_error: 8
    filter_min_tri_angle: 1.5
    init_max_error: 4
    init_min_tri_angle: 16
    abs_pose_max_error: 12
    abs_pose_min_num_inliers: 30

  undistorter:
    output_type: "COLMAP"
    copy_policy: "copy"
    blank_pixels: 0
    min_scale: 0.2
    max_scale: 2
    max_image_size: -1
    num_patch_match_src_images: 20
    jpeg_quality: -1

# OpenSplat training parameters
opensplat:
  num_iters: 1500
  downscale_factor: 1
  num_downscales: 2
  resolution_schedule: 1000
  sh_degree: 3
  sh_degree_interval: 1000
  ssim_weight: 0.2
  refine_every: 100
  warmup_length: 250
  reset_alpha_every: 30
  densify_grad_thresh: 0.00001
  densify_size_thresh: 0.00025
  stop_screen_size_at: 1000
  split_screen_size: 0.05

# Validation parameters
validation:
  enabled: true
  image: "frame_0045.jpg"

# Hydra configuration
hydra:
  output_subdir: null
  run:
    dir: logs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/hydra/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
