# Training configuration for 3D Gaussian Splat
# Paths are relative to the project root

[data]
# Input directories
frames_dir = "data/intermediate/frames"
sfm_dir = "data/intermediate/sfm"

# Output directory
output_dir = "data/intermediate/gs/latest"

# Downscale factor for images (1 = full res, 2 = half res, etc.)
downscale = 8

[training]
# Number of training steps
num_steps = 100

# Initial number of Gaussians
num_gaussians = 100

# Learning rates per parameter
lr_means = 0.01
lr_quats = 0.001
lr_scales = 0.005
lr_opacities = 0.005
lr_sh_coeffs = 0.005

# Gaussian initialization
init_scale_log = -3.0  # log(0.05) H -3.0
init_opacity = 0.0    # sigmoid(0) = 0.5

# Spherical Harmonics degree (0-3 for training, 0-4 for rendering)
sh_degree = 1

[loss]
# Loss function weight distribution
l1_weight = 1.0
ssim_weight = 0.2  # SSIM (if available)

# Image loss scale
loss_scale = 1.0

[rendering]
# Render mode: RGB, RGB+D, D, etc.
render_mode = "RGB"

# Number of rendering tiles
tile_size = 16

# Differentiable rendering
differentiable = true

[optimization]
# Adam optimizer parameters
adam_eps = 1e-8
adam_beta1 = 0.9
adam_beta2 = 0.999

# Gaussian densification (not used in simple version)
densify_every_n_steps = 100
densify_until_step = 1500

[logging]
# Logging frequency (steps)
log_every_n_steps = 100

# Save checkpoint frequency
save_every_n_steps = 500

[device]
# Device (mlx will use GPU/Metal by default)
use_gpu = true
