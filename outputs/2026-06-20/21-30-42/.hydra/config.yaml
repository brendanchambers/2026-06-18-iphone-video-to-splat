project:
  dir: /Users/bc/brendanchambers/2026-06-18-iphone-video-to-splat
  video_path: ./data/incoming/movies/gardenbed_2026-06-17.mov
  experiment_name: testing
paths:
  images_dir: ${project.dir}/data/intermediates/${project.experiment_name}/images
  sparse_dir: ${project.dir}/data/intermediates/${project.experiment_name}/sparse
  database_path: ${project.dir}/data/intermediates/${project.experiment_name}/database.db
  distortion_corrected_dir: ${project.dir}/data/intermediates/${project.experiment_name}_distortion_corrected
  log_dir: ${project.dir}/logs
  opensplat_bin: ${project.dir}/opensplat/build/opensplat
  opensplat_output_dir: ${paths.distortion_corrected_dir}/splats
  val_render_dir: ${project.dir}/data/intermediates/validation_renders
frame_extraction:
  fps: 2
  quality: 2
colmap:
  feature_extraction:
    camera_model: RADIAL
    single_camera: 1
    default_focal_length_factor: 1.2
    type: SIFT
    use_gpu: 1
    gpu_index: -1
    sift_max_num_features: 4096
    sift_first_octave: -1
    sift_num_octaves: 4
    sift_octave_resolution: 3
    sift_peak_threshold: 0.00667
    sift_edge_threshold: 20
    sift_estimate_affine_shape: 0
    sift_max_num_orientations: 2
    sift_upright: 0
  feature_matching:
    type: SIFT_BRUTEFORCE
    use_gpu: 1
    gpu_index: -1
    guided_matching: 0
    skip_geometric_verification: 0
    max_num_matches: 32768
    sift_max_ratio: 0.8
    sift_max_distance: 0.7
    sift_cross_check: 1
    cpu_brute_force_matcher: 0
    two_view_min_num_inliers: 15
    two_view_max_error: 4
    two_view_confidence: 0.999
    two_view_max_num_trials: 10000
    two_view_min_inlier_ratio: 0.25
    sequential_overlap: 20
  mapper:
    multiple_models: 1
    max_num_models: 50
    min_model_size: 10
    init_num_trials: 200
    extract_colors: 1
    num_threads: -1
    min_focal_length_ratio: 0.1
    max_focal_length_ratio: 10
    ba_refine_focal_length: 1
    ba_refine_principal_point: 0
    ba_refine_extra_params: 1
    ba_local_max_num_iterations: 25
    ba_global_max_num_iterations: 50
    ba_global_frames_freq: 500
    ba_global_points_freq: 250000
    filter_max_reproj_error: 8
    filter_min_tri_angle: 1.5
    init_max_error: 4
    init_min_tri_angle: 16
    abs_pose_max_error: 12
    abs_pose_min_num_inliers: 30
  undistorter:
    output_type: COLMAP
    copy_policy: copy
    blank_pixels: 0
    min_scale: 0.2
    max_scale: 2
    max_image_size: -1
    num_patch_match_src_images: 20
    jpeg_quality: -1
opensplat:
  num_iters: 1500
  downscale_factor: 1
  num_downscales: 2
  resolution_schedule: 3000
  sh_degree: 3
  sh_degree_interval: 1000
  ssim_weight: 0.2
  refine_every: 100
  warmup_length: 500
  reset_alpha_every: 30
  densify_grad_thresh: 0.0002
  densify_size_thresh: 0.01
  stop_screen_size_at: 4000
  split_screen_size: 0.05
validation:
  enabled: true
  image: frame_0032.jpg
