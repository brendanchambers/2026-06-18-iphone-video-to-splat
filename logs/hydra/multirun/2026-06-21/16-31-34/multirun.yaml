hydra:
  run:
    dir: logs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/hydra/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: null
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - opensplat.densify_size_thresh=0.0025,0.005,0.01
    - opensplat.densify_grad_thresh=0.0001,0.0002,0.0004
  job:
    name: pipeline
    chdir: null
    override_dirname: opensplat.densify_grad_thresh=0.0001,0.0002,0.0004,opensplat.densify_size_thresh=0.0025,0.005,0.01
    id: ???
    num: ???
    config_name: hparam_sweep
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.3
    version_base: '1.3'
    cwd: /Users/bc/brendanchambers/2026-06-18-iphone-video-to-splat
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/bc/brendanchambers/2026-06-18-iphone-video-to-splat/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
project:
  dir: /Users/bc/brendanchambers/2026-06-18-iphone-video-to-splat
  video_path: ./data/incoming/movies/teensy.mov
  experiment_name: densify_sz${opensplat.densify_size_thresh}_gr${opensplat.densify_grad_thresh}
  experiment_group: sweep_densify_size_and_gradient_threshold
paths:
  colmap_sfm_camera_model: ${project.dir}/data/intermediates/${project.experiment_name}/colmap_sfm_camera_model
  colmap_sfm_linearized: ${project.dir}/data/intermediates/${project.experiment_name}/colmap_sfm_linearized
  images_dir: ${paths.colmap_sfm_camera_model}/images
  sparse_dir: ${paths.colmap_sfm_camera_model}/sparse
  database_path: ${paths.colmap_sfm_camera_model}/database.db
  log_dir: ${project.dir}/logs
  opensplat_bin: ${project.dir}/opensplat/build/opensplat
  opensplat_output_dir: ${paths.colmap_sfm_linearized}/splats
frame_extraction:
  fps: 2
  quality: 5
colmap:
  feature_extraction:
    camera_model: RADIAL
    single_camera: 1
    default_focal_length_factor: 1.2
    type: SIFT
    use_gpu: 1
    gpu_index: -1
    sift_max_num_features: 4096
    sift_first_octave: -1
    sift_num_octaves: 4
    sift_octave_resolution: 3
    sift_peak_threshold: 0.00667
    sift_edge_threshold: 10
    sift_estimate_affine_shape: 0
    sift_max_num_orientations: 2
    sift_upright: 0
  feature_matching:
    type: SIFT_BRUTEFORCE
    use_gpu: 1
    gpu_index: -1
    guided_matching: 0
    skip_geometric_verification: 0
    max_num_matches: 32768
    sift_max_ratio: 0.8
    sift_max_distance: 0.7
    sift_cross_check: 1
    cpu_brute_force_matcher: 0
    two_view_min_num_inliers: 15
    two_view_max_error: 4
    two_view_confidence: 0.999
    two_view_max_num_trials: 10000
    two_view_min_inlier_ratio: 0.25
    sequential_overlap: 20
  mapper:
    multiple_models: 1
    max_num_models: 50
    min_model_size: 10
    init_num_trials: 200
    extract_colors: 1
    num_threads: -1
    min_focal_length_ratio: 0.1
    max_focal_length_ratio: 10
    ba_refine_focal_length: 1
    ba_refine_principal_point: 0
    ba_refine_extra_params: 1
    ba_local_max_num_iterations: 25
    ba_global_max_num_iterations: 50
    ba_global_frames_freq: 500
    ba_global_points_freq: 250000
    filter_max_reproj_error: 8
    filter_min_tri_angle: 1.5
    init_max_error: 4
    init_min_tri_angle: 16
    abs_pose_max_error: 12
    abs_pose_min_num_inliers: 30
  undistorter:
    output_type: COLMAP
    copy_policy: copy
    blank_pixels: 0
    min_scale: 0.2
    max_scale: 2
    max_image_size: -1
    num_patch_match_src_images: 20
    jpeg_quality: -1
opensplat:
  num_iters: 50
  downscale_factor: 1
  num_downscales: 2
  resolution_schedule: 1000
  sh_degree: 3
  sh_degree_interval: 1000
  ssim_weight: 0.2
  refine_every: 100
  warmup_length: 250
  reset_alpha_every: 30
  densify_grad_thresh: 0.0002
  densify_size_thresh: 0.005
  stop_screen_size_at: 1000
  split_screen_size: 0.05
validation:
  enabled: true
  image: frame_0001.jpg
